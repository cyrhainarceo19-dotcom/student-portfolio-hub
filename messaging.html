<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Student Portfolio Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .messaging-container {
            display: flex;
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 6rem 1.5rem 1.5rem;
            min-height: calc(100vh - 80px);
        }
        
        .conversations-sidebar {
            width: 320px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1rem;
            text-align: center;
        }
        
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }
        
        .conversation-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .conversation-item:hover { background: #f8f9ff; }
        .conversation-item.active { background: #e0e7ff; }
        
        .conv-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .conv-info { flex: 1; min-width: 0; }
        .conv-name { font-weight: 600; margin-bottom: 0.2rem; }
        .conv-last-msg { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-unread {
            background: #667eea;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        .chat-area {
            flex: 1;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .chat-avatar {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: #f8fafc;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 0.7rem 1rem;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message-sent {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message-received {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .message-time { font-size: 0.65rem; opacity: 0.7; margin-top: 0.2rem; text-align: right; }
        
        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 0.5rem;
            background: white;
        }
        
        .chat-input {
            flex: 1;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
            font-family: inherit;
        }
        
        .chat-input:focus { border-color: #667eea; }
        
        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .send-btn:hover { transform: translateY(-2px); }
        
        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
            text-align: center;
            padding: 2rem;
        }
        
        .emoji-picker-container { position: relative; }
        .emoji-btn {
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            padding: 0.8rem 1rem;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
        .emoji-btn:hover { background: #e0e0e0; }
        
        .emoji-picker {
            position: absolute;
            bottom: 60px;
            left: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            padding: 0.8rem;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 0.5rem;
            z-index: 100;
            max-width: 360px;
            border: 1px solid #e2e8f0;
        }
        .emoji-picker.active { display: grid; }
        .emoji-option { font-size: 1.3rem; cursor: pointer; padding: 0.3rem; text-align: center; border-radius: 8px; }
        .emoji-option:hover { background: #f0f0f0; }
        
        @media (max-width: 768px) {
            .messaging-container { flex-direction: column; padding: 5rem 1rem 1rem; }
            .conversations-sidebar { width: 100%; max-height: 300px; }
            .message-bubble { max-width: 85%; }
            .emoji-picker { grid-template-columns: repeat(6, 1fr); max-width: 280px; }
        }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="nav-container">
            <div class="logo">💬 Private Messages</div>
            <ul class="nav-links">
                <li><a href="dashboard.html">🏠 Home</a></li>
                <li><a href="editor.html">✏️ Edit Portfolio</a></li>
                <li><a href="messaging.html">💬 Messages</a></li>
                <li><span class="user-badge" id="userNameDisplay"></span></li>
                <li><button id="logoutBtn" class="btn-logout">🚪 Logout</button></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <div class="messaging-container">
        <div class="conversations-sidebar">
            <div class="sidebar-header"><h3>💬 Private Conversations</h3></div>
            <div class="conversations-list" id="conversationsList"><div style="text-align:center; padding:2rem;">📱 Loading...</div></div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header"><div class="chat-avatar" id="chatAvatar">?</div><div><h3 id="chatUserName">Select a conversation</h3></div></div>
            <div class="chat-messages" id="chatMessages"><div class="empty-chat"><p>👈 Select a conversation</p><p style="font-size:0.8rem;">Your private messages are secure and only visible to you and the recipient.</p></div></div>
            <div class="chat-input-area" id="chatInputArea" style="display: none;">
                <div class="emoji-picker-container"><button class="emoji-btn" id="emojiBtn">😊</button><div class="emoji-picker" id="emojiPicker"></div></div>
                <input type="text" id="messageInput" class="chat-input" placeholder="💬 Type your private message...">
                <button id="sendBtn" class="send-btn">📤 Send</button>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== API CONFIGURATION ====================
        const SHEETBEST_STUDENTS_URL = "https://api.sheetbest.com/sheets/54f68e59-9aa4-4e67-b267-1a4241a9a9df";
        const MESSAGES_API_URL = "https://api.sheetbest.com/sheets/032cac6c-f303-4712-ac3c-ed72f963b983";
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('userNameDisplay').textContent = currentUser.fullname;
        
        let allStudents = [];
        let conversations = [];
        let currentChatUser = null;
        let refreshInterval = null;
        
        const urlParams = new URLSearchParams(window.location.search);
        const directMessageUser = urlParams.get('user');
        
        // ==================== PRIVATE MESSAGES FUNCTIONS ====================
        
        // Get messages ONLY between two specific users
        async function getPrivateMessages(user1, user2) {
            try {
                // Fetch messages where (fromUser=user1 AND toUser=user2) OR (fromUser=user2 AND toUser=user1)
                const response = await fetch(MESSAGES_API_URL);
                const allMessages = await response.json();
                
                // Filter messages that are between these two users only
                const privateMessages = allMessages.filter(msg => 
                    (msg.fromUser === user1 && msg.toUser === user2) ||
                    (msg.fromUser === user2 && msg.toUser === user1)
                );
                
                // Sort by timestamp
                return privateMessages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            } catch (error) {
                console.error('Error loading private messages:', error);
                return [];
            }
        }
        
        // Send a private message
        async function sendPrivateMessage(fromUser, toUser, message) {
            try {
                const newMessage = {
                    id: Date.now().toString(),
                    fromUser: fromUser,
                    toUser: toUser,
                    message: message,
                    timestamp: new Date().toISOString(),
                    read: false
                };
                
                const response = await fetch(MESSAGES_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newMessage)
                });
                
                return response.ok;
            } catch (error) {
                console.error('Error sending private message:', error);
                return false;
            }
        }
        
        // Mark messages as read (only for current user)
        async function markPrivateMessagesAsRead(fromUser, toUser) {
            try {
                const response = await fetch(MESSAGES_API_URL);
                const allMessages = await response.json();
                
                const unreadMessages = allMessages.filter(msg => 
                    msg.fromUser === fromUser && 
                    msg.toUser === toUser && 
                    msg.read === false
                );
                
                for (const msg of unreadMessages) {
                    await fetch(`${MESSAGES_API_URL}/${msg.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...msg, read: true })
                    });
                }
            } catch (error) {
                console.error('Error marking messages as read:', error);
            }
        }
        
        // Get all conversations for current user (only involving current user)
        async function getUserConversations() {
            try {
                const response = await fetch(MESSAGES_API_URL);
                const allMessages = await response.json();
                
                // Get all messages where current user is either sender or receiver
                const userMessages = allMessages.filter(msg => 
                    msg.fromUser === currentUser.username || 
                    msg.toUser === currentUser.username
                );
                
                // Extract unique other users
                const otherUsers = new Set();
                userMessages.forEach(msg => {
                    if (msg.fromUser === currentUser.username) {
                        otherUsers.add(msg.toUser);
                    } else {
                        otherUsers.add(msg.fromUser);
                    }
                });
                
                // Build conversation objects
                const convs = [];
                for (const otherUsername of otherUsers) {
                    const student = allStudents.find(s => s.username === otherUsername);
                    if (student) {
                        const privateMsgs = await getPrivateMessages(currentUser.username, otherUsername);
                        const lastMsg = privateMsgs[privateMsgs.length - 1];
                        const unreadCount = privateMsgs.filter(m => 
                            m.toUser === currentUser.username && !m.read
                        ).length;
                        
                        convs.push({
                            username: otherUsername,
                            fullname: student.fullname,
                            avatar: student.avatar || student.fullname.charAt(0).toUpperCase(),
                            lastMessage: lastMsg ? lastMsg.message : 'No messages yet',
                            lastTime: lastMsg ? lastMsg.timestamp : '',
                            unread: unreadCount
                        });
                    }
                }
                
                // Sort by most recent
                return convs.sort((a, b) => {
                    if (!a.lastTime) return 1;
                    if (!b.lastTime) return -1;
                    return new Date(b.lastTime) - new Date(a.lastTime);
                });
                
            } catch (error) {
                console.error('Error getting conversations:', error);
                return [];
            }
        }
        
        // ==================== RENDER FUNCTIONS ====================
        
        function renderConversations() {
            const container = document.getElementById('conversationsList');
            
            if (conversations.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:2rem;">
                        <p>💭 No conversations yet</p>
                        <p style="font-size:0.8rem; color:#888;">Go to a student's profile and send a private message</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item" data-username="${conv.username}" onclick="selectConversation('${conv.username}')">
                    <div class="conv-avatar">${escapeHtml(conv.avatar)}</div>
                    <div class="conv-info">
                        <div class="conv-name">${escapeHtml(conv.fullname)}</div>
                        <div class="conv-last-msg">${escapeHtml(conv.lastMessage.substring(0, 50))}${conv.lastMessage.length > 50 ? '...' : ''}</div>
                    </div>
                    ${conv.unread > 0 ? `<div class="conv-unread">${conv.unread}</div>` : ''}
                </div>
            `).join('');
        }
        
        async function renderMessages() {
            const messagesContainer = document.getElementById('chatMessages');
            
            if (!currentChatUser) {
                messagesContainer.innerHTML = `
                    <div class="empty-chat">
                        <p>👈 Select a conversation from the sidebar</p>
                        <p style="font-size:0.8rem;">🔒 Your private messages are secure and only visible to you and the recipient.</p>
                    </div>
                `;
                document.getElementById('chatInputArea').style.display = 'none';
                return;
            }
            
            const privateMessages = await getPrivateMessages(currentUser.username, currentChatUser);
            const chatPartner = allStudents.find(s => s.username === currentChatUser);
            
            if (chatPartner) {
                document.getElementById('chatUserName').textContent = chatPartner.fullname;
                document.getElementById('chatAvatar').textContent = chatPartner.avatar || chatPartner.fullname.charAt(0).toUpperCase();
            }
            
            if (privateMessages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="empty-chat">
                        <p>💬 No private messages yet</p>
                        <p style="font-size:0.8rem;">Send a message to start a private conversation!</p>
                        <p style="font-size:0.8rem;">🔒 Only you and ${escapeHtml(chatPartner?.fullname || 'the recipient')} can see these messages.</p>
                    </div>
                `;
            } else {
                messagesContainer.innerHTML = privateMessages.map(msg => `
                    <div class="message-bubble ${msg.fromUser === currentUser.username ? 'message-sent' : 'message-received'}">
                        ${escapeHtml(msg.message)}
                        <div class="message-time">${formatTime(msg.timestamp)}</div>
                    </div>
                `).join('');
                
                // Mark messages as read (only messages sent TO current user)
                await markPrivateMessagesAsRead(currentChatUser, currentUser.username);
                
                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            
            document.getElementById('chatInputArea').style.display = 'flex';
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            return date.toLocaleDateString();
        }
        
        // ==================== CONVERSATION ACTIONS ====================
        
        async function selectConversation(username) {
            currentChatUser = username;
            await loadAllData();
            renderConversations();
            await renderMessages();
            
            // Highlight active conversation
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.toggle('active', item.dataset.username === username);
            });
        }
        
        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if (!message || !currentChatUser) return;
            
            const success = await sendPrivateMessage(currentUser.username, currentChatUser, message);
            
            if (success) {
                messageInput.value = '';
                await loadAllData();
                await renderMessages();
                renderConversations();
            }
        }
        
        // ==================== LOAD DATA ====================
        
        async function loadAllData() {
            // Fetch all students
            const studentsRes = await fetch(SHEETBEST_STUDENTS_URL);
            allStudents = await studentsRes.json();
            
            // Get conversations for current user only
            conversations = await getUserConversations();
            renderConversations();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ==================== EMOJI PICKER ====================
        const emojis = ['😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','😍','🥰','😘','😎','🤩','🥳','😏','😞','😔','😢','😭','😤','😡','🤯','😳','🥵','🥶','😱','❤️','🧡','💛','💚','💙','💜','👍','👎','👏','🙌','🎉','✨','🔥','💀','👻','🤖','💩','🎈','⭐','🌟','💫'];
        const picker = document.getElementById('emojiPicker');
        picker.innerHTML = emojis.map(e => `<div class="emoji-option">${e}</div>`).join('');
        
        document.getElementById('emojiBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            picker.classList.toggle('active');
        });
        
        document.querySelectorAll('.emoji-option').forEach(emoji => {
            emoji.addEventListener('click', () => {
                document.getElementById('messageInput').value += emoji.textContent;
                picker.classList.remove('active');
                document.getElementById('messageInput').focus();
            });
        });
        
        document.addEventListener('click', () => picker.classList.remove('active'));
        
        // ==================== AUTO REFRESH ====================
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(async () => {
                if (currentChatUser) {
                    await renderMessages();
                }
                await loadAllData();
            }, 3000);
        }
        
        // ==================== EVENT LISTENERS ====================
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
        
        // Make selectConversation available globally
        window.selectConversation = selectConversation;
        
        // Navbar scroll effect
        window.addEventListener('scroll', function() {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });
        
        // Mobile menu
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
            });
        }
        
        // Initialize
        loadAllData().then(() => {
            if (directMessageUser) {
                selectConversation(directMessageUser);
            }
        });
        startAutoRefresh();
    </script>
</body>
</html>
