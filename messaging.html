<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Student Portfolio Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .messaging-container {
            display: flex;
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 6rem 1.5rem 1.5rem;
            min-height: calc(100vh - 80px);
        }
        .conversations-sidebar {
            width: 320px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }
        .conversation-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }
        .conversation-item:hover { background: #f8f9ff; }
        .conversation-item.active { background: #e0e7ff; }
        .conv-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .conv-info { flex: 1; }
        .conv-name { font-weight: 600; }
        .conv-last-msg { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-unread { background: #667eea; color: white; padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.7rem; }
        .chat-area {
            flex: 1;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .chat-avatar {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: #f8fafc;
        }
        .message-bubble {
            max-width: 70%;
            padding: 0.7rem 1rem;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .message-sent {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-received {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message-time { font-size: 0.65rem; opacity: 0.7; margin-top: 0.2rem; text-align: right; }
        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 0.5rem;
            background: white;
        }
        .chat-input {
            flex: 1;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
        }
        .chat-input:focus { border-color: #667eea; }
        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
        }
        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
            text-align: center;
            padding: 2rem;
        }
        .emoji-picker-container { position: relative; }
        .emoji-btn {
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            padding: 0.8rem 1rem;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .emoji-picker {
            position: absolute;
            bottom: 60px;
            left: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            padding: 0.8rem;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 0.5rem;
            max-width: 360px;
            z-index: 100;
        }
        .emoji-picker.active { display: grid; }
        .emoji-option { font-size: 1.3rem; cursor: pointer; padding: 0.3rem; text-align: center; border-radius: 8px; }
        .emoji-option:hover { background: #f0f0f0; }
        @media (max-width: 768px) {
            .messaging-container { flex-direction: column; padding: 5rem 1rem 1rem; }
            .conversations-sidebar { width: 100%; max-height: 300px; }
            .message-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">💬 Messages</div>
            <ul class="nav-links">
                <li><a href="dashboard.html">🏠 My Profile</a></li>
                <li><a href="students.html">👥 All Students</a></li>
                <li><a href="editor.html">✏️ Edit Portfolio</a></li>
                <li><a href="messaging.html">💬 Messages</a></li>
                <li><span class="user-badge" id="userNameDisplay"></span></li>
                <li><button id="logoutBtn" class="btn-logout">🚪 Logout</button></li>
            </ul>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>
    
    <div class="messaging-container">
        <div class="conversations-sidebar">
            <div class="sidebar-header"><h3>💬 Conversations</h3></div>
            <div class="conversations-list" id="conversationsList"><div style="text-align:center; padding:2rem;">📱 Loading...</div></div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header"><div class="chat-avatar" id="chatAvatar">?</div><div><h3 id="chatUserName">Select a conversation</h3></div></div>
            <div class="chat-messages" id="chatMessages"><div class="empty-chat"><p>👈 Select a conversation</p><p>Your private messages are secure</p></div></div>
            <div class="chat-input-area" id="chatInputArea" style="display: none;">
                <div class="emoji-picker-container"><button class="emoji-btn" id="emojiBtn">😊</button><div class="emoji-picker" id="emojiPicker"></div></div>
                <input type="text" id="messageInput" class="chat-input" placeholder="Type your message...">
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>
    </div>
    
    <script>
        const STUDENTS_API = "https://docs.google.com/spreadsheets/d/1IFS517-sz75EcRmem-SE-ONFnPfAO46djuLZUjvQmvc/edit?usp=sharing";
        const MESSAGES_API = "https://api.sheetbest.com/sheets/032cac6c-f303-4712-ac3c-ed72f963b983";
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('userNameDisplay').textContent = currentUser.fullname;
        
        let allStudents = [], conversations = [], currentChatUser = null;
        const urlParams = new URLSearchParams(window.location.search);
        const directMessageUser = urlParams.get('user');
        
        function escapeHtml(t) { if(!t) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
        
        async function getMessages(u1, u2) {
            const res = await fetch(MESSAGES_API);
            const all = await res.json();
            return all.filter(m => (m.fromUser === u1 && m.toUser === u2) || (m.fromUser === u2 && m.toUser === u1)).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
        }
        
        async function sendMessage(from, to, msg) {
            const res = await fetch(MESSAGES_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: Date.now().toString(), fromUser: from, toUser: to, message: msg, timestamp: new Date().toISOString(), read: false })
            });
            return res.ok;
        }
        
        async function markRead(from, to) {
            const res = await fetch(MESSAGES_API);
            const all = await res.json();
            const unread = all.filter(m => m.fromUser === from && m.toUser === to && !m.read);
            for(const m of unread) await fetch(`${MESSAGES_API}/${m.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({...m, read: true}) });
        }
        
        async function getConversations() {
            const res = await fetch(STUDENTS_API);
            allStudents = await res.json();
            const msgsRes = await fetch(MESSAGES_API);
            const allMsgs = await msgsRes.json();
            const userMsgs = allMsgs.filter(m => m.fromUser === currentUser.username || m.toUser === currentUser.username);
            const otherUsers = [...new Set(userMsgs.map(m => m.fromUser === currentUser.username ? m.toUser : m.fromUser))];
            const convs = [];
            for(const u of otherUsers) {
                const student = allStudents.find(s => s.username === u);
                if(student) {
                    const msgs = await getMessages(currentUser.username, u);
                    const last = msgs[msgs.length-1];
                    convs.push({ username: u, fullname: student.fullname, avatar: student.avatar || student.fullname.charAt(0).toUpperCase(), lastMessage: last?.message || 'No messages', unread: msgs.filter(m => m.toUser === currentUser.username && !m.read).length });
                }
            }
            return convs.sort((a,b)=>new Date(b.lastTime)-new Date(a.lastTime));
        }
        
        async function renderConversations() {
            const c = document.getElementById('conversationsList');
            if(!conversations.length) { c.innerHTML = '<div style="text-align:center; padding:2rem;">💭 No conversations yet</div>'; return; }
            c.innerHTML = conversations.map(conv => `<div class="conversation-item" data-username="${conv.username}" onclick="selectConversation('${conv.username}')"><div class="conv-avatar">${escapeHtml(conv.avatar)}</div><div class="conv-info"><div class="conv-name">${escapeHtml(conv.fullname)}</div><div class="conv-last-msg">${escapeHtml(conv.lastMessage.substring(0,50))}</div></div>${conv.unread ? `<div class="conv-unread">${conv.unread}</div>` : ''}</div>`).join('');
        }
        
        async function renderMessages() {
            const container = document.getElementById('chatMessages');
            if(!currentChatUser) { container.innerHTML = '<div class="empty-chat"><p>👈 Select a conversation</p></div>'; document.getElementById('chatInputArea').style.display = 'none'; return; }
            const msgs = await getMessages(currentUser.username, currentChatUser);
            const partner = allStudents.find(s => s.username === currentChatUser);
            if(partner) { document.getElementById('chatUserName').textContent = partner.fullname; document.getElementById('chatAvatar').textContent = partner.avatar || partner.fullname.charAt(0).toUpperCase(); }
            if(!msgs.length) container.innerHTML = '<div class="empty-chat"><p>💬 No messages yet</p><p>Send a message to start!</p></div>';
            else {
                container.innerHTML = msgs.map(m => `<div class="message-bubble ${m.fromUser === currentUser.username ? 'message-sent' : 'message-received'}">${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleString()}</div></div>`).join('');
                await markRead(currentChatUser, currentUser.username);
                container.scrollTop = container.scrollHeight;
            }
            document.getElementById('chatInputArea').style.display = 'flex';
        }
        
        async function selectConversation(username) { currentChatUser = username; await loadAll(); renderConversations(); await renderMessages(); document.querySelectorAll('.conversation-item').forEach(i => i.classList.toggle('active', i.dataset.username === username)); }
        
        async function sendMessageHandler() {
            const msg = document.getElementById('messageInput').value.trim();
            if(!msg || !currentChatUser) return;
            if(await sendMessage(currentUser.username, currentChatUser, msg)) { document.getElementById('messageInput').value = ''; await loadAll(); await renderMessages(); renderConversations(); }
        }
        
        async function loadAll() { conversations = await getConversations(); renderConversations(); }
        
        const emojis = ['😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','😍','🥰','😘','😎','🤩','🥳','😏','😞','😔','😢','😭','😤','😡','🤯','😳','❤️','💛','💚','💙','💜','👍','👎','👏','🙌','🎉','✨','🔥'];
        const picker = document.getElementById('emojiPicker');
        picker.innerHTML = emojis.map(e => `<div class="emoji-option">${e}</div>`).join('');
        document.getElementById('emojiBtn').onclick = (e) => { e.stopPropagation(); picker.classList.toggle('active'); };
        document.querySelectorAll('.emoji-option').forEach(e => e.onclick = () => { document.getElementById('messageInput').value += e.textContent; picker.classList.remove('active'); });
        document.onclick = () => picker.classList.remove('active');
        
        document.getElementById('sendBtn').onclick = sendMessageHandler;
        document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessageHandler(); };
        document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; };
        window.selectConversation = selectConversation;
        window.addEventListener('scroll', () => document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 50));
        const hamburger = document.querySelector('.hamburger'), navLinks = document.querySelector('.nav-links');
        if(hamburger) hamburger.onclick = () => { hamburger.classList.toggle('active'); navLinks.classList.toggle('active'); };
        
        loadAll().then(() => { if(directMessageUser) selectConversation(directMessageUser); });
        setInterval(async () => { if(currentChatUser) { await renderMessages(); await loadAll(); } }, 3000);
    </script>
</body>
</html>
