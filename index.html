<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portfolio - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .toggle-link a:hover {
            text-decoration: underline;
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Student Portfolio</h1>
            <p>Showcase your achievements</p>
        </div>
        
        <div id="loginForm">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="loginUsername" placeholder="Enter username or email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <button onclick="login()">Login</button>
            <div class="toggle-link">
                Don't have an account? <a href="#" onclick="showSignup()">Sign up</a>
            </div>
        </div>
        
        <div id="signupForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupFullname" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="signupUsername" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)">
            </div>
            <button onclick="signup()">Sign Up</button>
            <div class="toggle-link">
                Already have an account? <a href="#" onclick="showLogin()">Login</a>
            </div>
        </div>
        
        <div id="message" class="message"></div>
    </div>
    
    <script>
        const API_URL = google.script.run;
        
        function showMessage(msg, isSuccess) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + (isSuccess ? 'success' : 'error');
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }
        
        function showSignup() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            document.getElementById('message').className = 'message';
        }
        
        function showLogin() {
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('message').className = 'message';
        }
        
        function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showMessage('Please fill in all fields', false);
                return;
            }
            
            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.success) {
                        showMessage(response.message, true);
                        localStorage.setItem('currentUser', JSON.stringify(response.user));
                        setTimeout(() => {
                            window.location.href = '?page=dashboard';
                        }, 1000);
                    } else {
                        showMessage(response.message, false);
                    }
                })
                .withFailureHandler(function(error) {
                    showMessage('Error: ' + error.message, false);
                })
                .handleLogin({ action: 'login', username: username, password: password });
        }
        
        function signup() {
            const fullname = document.getElementById('signupFullname').value;
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!fullname || !username || !email || !password) {
                showMessage('Please fill in all fields', false);
                return;
            }
            
            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.success) {
                        showMessage(response.message, true);
                        setTimeout(() => {
                            showLogin();
                            document.getElementById('loginUsername').value = username;
                        }, 2000);
                    } else {
                        showMessage(response.message, false);
                    }
                })
                .withFailureHandler(function(error) {
                    showMessage('Error: ' + error.message, false);
                })
                .handleSignup({ action: 'signup', fullname: fullname, username: username, email: email, password: password });
        }
        
        // Check if user is already logged in
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser && window.location.href.includes('?page=')) {
            window.location.href = '?page=dashboard';
        }
    </script>
</body>
</html>
