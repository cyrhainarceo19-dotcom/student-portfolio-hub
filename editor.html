<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Portfolio | Student Portfolio Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .editor-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 6rem 2rem 2rem;
        }
        .editor-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .editor-title {
            font-size: 1.3rem;
            color: #667eea;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #f0f0f0;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        .form-input, .form-textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        .skills-container, .achievements-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: #f8fafc;
            border-radius: 12px;
            min-height: 60px;
        }
        .skill-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .achievement-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #fef3c7;
            color: #92400e;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .remove-btn {
            background: rgba(0,0,0,0.2);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        .remove-ach {
            background: #fed7aa;
            color: #92400e;
        }
        .add-section {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .add-section input {
            flex: 1;
            padding: 0.6rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
        }
        .project-item {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border-left: 4px solid #667eea;
        }
        .project-name {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .project-desc {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: #dcfce7;
            color: #16a34a;
            display: block;
        }
        .message.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }
        @media (max-width: 768px) {
            .editor-container {
                padding: 5rem 1rem 1rem;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">✏️ Edit Portfolio</div>
            <ul class="nav-links">
                <li><a href="dashboard.html">🏠 My Profile</a></li>
                <li><a href="students.html">👥 All Students</a></li>
                <li><a href="editor.html">✏️ Edit Portfolio</a></li>
                <li><a href="messaging.html">💬 Messages</a></li>
                <li><span class="user-badge" id="userNameDisplay"></span></li>
                <li><button id="logoutBtn" class="btn-logout">🚪 Logout</button></li>
            </ul>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>
    
    <div class="editor-container">
        <div class="editor-card">
            <div class="editor-title">📝 Basic Information</div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="editFullname" class="form-input">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="editUsername" class="form-input" disabled style="background:#f5f5f5;">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="editEmail" class="form-input">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="editLocation" class="form-input" placeholder="e.g., Manila, Philippines">
            </div>
            <div class="form-group">
                <label>Bio / About Me</label>
                <textarea id="editBio" class="form-textarea" placeholder="Tell us about yourself..."></textarea>
            </div>
        </div>
        
        <div class="editor-card">
            <div class="editor-title">🛠️ Skills</div>
            <div id="skillsList" class="skills-container"></div>
            <div class="add-section">
                <input type="text" id="newSkill" placeholder="Enter a skill (e.g., Python, React)">
                <button id="addSkillBtn" class="btn-secondary">+ Add Skill</button>
            </div>
        </div>
        
        <div class="editor-card">
            <div class="editor-title">🚀 Projects</div>
            <div id="projectsList"></div>
            <button id="addProjectBtn" class="btn-secondary">+ Add New Project</button>
        </div>
        
        <div class="editor-card">
            <div class="editor-title">🏆 Achievements</div>
            <div id="achievementsList" class="achievements-container"></div>
            <div class="add-section">
                <input type="text" id="newAchievement" placeholder="Enter an achievement (e.g., Dean's List)">
                <button id="addAchievementBtn" class="btn-secondary">+ Add Achievement</button>
            </div>
        </div>
        
        <div class="editor-card">
            <div class="action-buttons">
                <button id="saveBtn" class="btn-primary">💾 Save All Changes</button>
                <button id="previewBtn" class="btn-secondary">👁️ Preview My Profile</button>
            </div>
            <div id="saveMessage" class="message"></div>
        </div>
    </div>
    
    <script>
        const API_URL = "https://api.sheetbest.com/sheets/54f68e59-9aa4-4e67-b267-1a4241a9a9df";
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('userNameDisplay').textContent = currentUser.fullname;
        
        let skills = [], projects = [], achievements = [];
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadUserData() {
            try {
                const response = await fetch(API_URL);
                const students = await response.json();
                const user = students.find(s => s.username === currentUser.username);
                
                if (user) {
                    document.getElementById('editFullname').value = user.fullname || '';
                    document.getElementById('editUsername').value = user.username || '';
                    document.getElementById('editEmail').value = user.email || '';
                    document.getElementById('editLocation').value = user.location || '';
                    document.getElementById('editBio').value = user.bio || '';
                    
                    skills = user.skills ? user.skills.split(',').map(s => s.trim()).filter(s => s) :
