<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile | Portfolio Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: #2d2d2d;
            overflow-x: hidden;
            background: #fafafa;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            padding: 0.7rem 0;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 2px 25px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #2d2d2d;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #667eea;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #2d2d2d;
            transition: 0.3s;
            border-radius: 2px;
        }

        /* Hero Section */
        #hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem 4rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        #hero::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveBackground 20s linear infinite;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-content {
            color: white;
        }

        .hero-content .greeting {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .hero-content .name {
            font-size: 2rem;
            margin-bottom: 1rem;
            opacity: 0.95;
        }

        .hero-content .highlight {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-content .bio {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-primary, .btn-secondary {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            border: 2px solid white;
            color: white;
        }

        .btn-secondary:hover {
            background: white;
            color: #667eea;
            transform: translateY(-3px);
        }

        .hero-image {
            text-align: center;
        }

        .hero-image img {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Sections Common */
        section {
            padding: 5rem 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        /* Education Section */
        .education-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .education-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .education-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .education-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .education-card h3 {
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .institution {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .year {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        /* Skills Section */
        #skills {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .skill-category {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .skill-category h3 {
            text-align: center;
            color: #667eea;
            margin-bottom: 1.5rem;
        }

        .skill-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .skill-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: transform 0.3s ease;
        }

        .skill-tag:hover {
            transform: scale(1.05);
        }

        /* Projects Section */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .project-image {
            height: 220px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .project-info {
            padding: 1.5rem;
        }

        .project-info h3 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        .project-info p {
            color: #666;
            margin-bottom: 1rem;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tech-tag {
            background: #f0f0f0;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            color: #667eea;
        }

        .project-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .project-link:hover {
            gap: 0.8rem;
        }

        /* Achievements Section */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .achievement-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .achievement-card:hover {
            transform: translateY(-5px);
        }

        .achievement-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .achievement-card h3 {
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        /* Contact Section */
        #contact {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem;
        }

        .contact-info h3,
        .contact-form h3 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .contact-details {
            list-style: none;
        }

        .contact-details li {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .social-links a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .social-links a:hover {
            transform: translateY(-3px);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
        }

        .submit-btn {
            background: white;
            color: #667eea;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Footer */
        footer {
            background: #2d2d2d;
            color: white;
            text-align: center;
            padding: 2rem;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .hero-container {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 2rem;
            }

            .hero-buttons {
                justify-content: center;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .hero-image img {
                width: 250px;
                height: 250px;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                left: -100%;
                top: 70px;
                flex-direction: column;
                background: white;
                width: 100%;
                text-align: center;
                transition: 0.3s;
                box-shadow: 0 10px 27px rgba(0,0,0,0.1);
                padding: 2rem 0;
                gap: 1.5rem;
            }

            .nav-links.active {
                left: 0;
            }

            .hamburger {
                display: flex;
            }

            .hamburger.active span:nth-child(1) {
                transform: rotate(45deg) translate(5px, 5px);
            }

            .hamburger.active span:nth-child(2) {
                opacity: 0;
            }

            .hamburger.active span:nth-child(3) {
                transform: rotate(-45deg) translate(7px, -6px);
            }

            .section-title {
                font-size: 2rem;
            }

            section {
                padding: 3rem 1.5rem;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        section {
            animation: fadeInUp 0.8s ease-out;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">👤 Student Portfolio</div>
            <ul class="nav-links">
                <li><a href="dashboard.html">🏠 My Profile</a></li>
                <li><a href="students.html">👥 All Students</a></li>
                <li><a href="editor.html">✏️ Edit Portfolio</a></li>
                <li><a href="messaging.html">💬 Messages</a></li>
                <li><span class="user-badge" id="userNameDisplay"></span></li>
                <li><button id="logoutBtn" class="btn-logout">🚪 Logout</button></li>
            </ul>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>
    
    <div class="profile-container">
        <a href="students.html" class="back-btn">← Back to Students</a>
        <div id="profileContent">
            <div style="text-align:center; padding:3rem;">
                <span class="loading-spinner"></span> Loading profile...
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = "https://api.sheetbest.com/sheets/54f68e59-9aa4-4e67-b267-1a4241a9a9df";
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('userNameDisplay').textContent = currentUser.fullname;
        
        const urlParams = new URLSearchParams(window.location.search);
        const viewUsername = urlParams.get('user');
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadProfile() {
            try {
                const response = await fetch(API_URL);
                const students = await response.json();
                const student = students.find(s => s.username === viewUsername);
                
                if (!student) {
                    document.getElementById('profileContent').innerHTML = '<div class="section-card"><h2>❌ Student Not Found</h2><a href="students.html" class="message-btn">Go Back</a></div>';
                    return;
                }
                
                const skills = student.skills ? student.skills.split(',').map(s => s.trim()).filter(s => s) : [];
                const projects = student.projects ? JSON.parse(student.projects) : [];
                const achievements = student.achievements ? student.achievements.split(',').map(a => a.trim()).filter(a => a) : [];
                const isOwnProfile = currentUser.username === viewUsername;
                
                const avatarHtml = student.profilePicture && student.profilePicture.startsWith('data:')
                    ? `<img src="${student.profilePicture}" class="profile-large-avatar" style="object-fit:cover;">`
                    : `<div class="profile-large-avatar">${escapeHtml(student.fullname.charAt(0).toUpperCase())}</div>`;
                
                document.getElementById('profileContent').innerHTML = `
                    <div class="profile-cover">
                        ${avatarHtml}
                        <h1>${escapeHtml(student.fullname)}</h1>
                        <p>@${escapeHtml(student.username)}</p>
                        <div class="profile-stats">
                            <div class="stat-box"><div class="stat-number">${skills.length}</div><div>Skills</div></div>
                            <div class="stat-box"><div class="stat-number">${projects.length}</div><div>Projects</div></div>
                            <div class="stat-box"><div class="stat-number">${achievements.length}</div><div>Achievements</div></div>
                        </div>
                        ${!isOwnProfile ? `<a href="messaging.html?user=${encodeURIComponent(student.username)}" class="message-btn">💬 Send Message</a>` : ''}
                    </div>
                    <div class="section-card">
                        <div class="section-title">📝 About Me</div>
                        <p>${escapeHtml(student.bio || 'No bio added yet.')}</p>
                        <div><strong>📍 Location:</strong> ${escapeHtml(student.location || 'Not specified')}</div>
                        <div><strong>📅 Joined:</strong> ${escapeHtml(student.createdAt || 'Recently')}</div>
                    </div>
                    <div class="section-card">
                        <div class="section-title">📧 Contact</div>
                        <div class="contact-info">✉️ ${escapeHtml(student.email)}</div>
                    </div>
                    <div class="section-card">
                        <div class="section-title">🛠️ Skills</div>
                        <div>${skills.length ? skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('') : '<p>No skills added yet.</p>'}</div>
                    </div>
                    <div class="section-card">
                        <div class="section-title">🚀 Projects</div>
                        ${projects.length ? projects.map(p => `<div class="project-card"><h4>📌 ${escapeHtml(p.name)}</h4><p>${escapeHtml(p.desc)}</p></div>`).join('') : '<p>No projects added yet.</p>'}
                    </div>
                    <div class="section-card">
                        <div class="section-title">🏆 Achievements</div>
                        <div>${achievements.length ? achievements.map(a => `<span class="achievement-badge">🏅 ${escapeHtml(a)}</span>`).join('') : '<p>No achievements added yet.</p>'}</div>
                    </div>
                    ${isOwnProfile ? '<div style="text-align:center;"><a href="editor.html" class="message-btn">✏️ Edit My Portfolio</a></div>' : ''}
                `;
            } catch(e) { console.error(e); }
        }
        
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        };
        
        window.addEventListener('scroll', () => document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 50));
        
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        if (hamburger) {
            hamburger.onclick = () => {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
            };
        }
        
        if (viewUsername) loadProfile();
        else document.getElementById('profileContent').innerHTML = '<div class="section-card"><h2>⚠️ No User Selected</h2><a href="students.html" class="message-btn">Go to Students</a></div>';
    </script>
</body>
</html>
